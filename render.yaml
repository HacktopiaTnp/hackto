services:
  # PostgreSQL Database
  - type: pserv
    name: hackto-postgres
    plan: free  # Change to 'standard' for production
    region: oregon  # Change to your preferred region
    databaseName: neondb
    user: neondb_owner
    # postgresVersion: "15" (auto-selected)

  # Redis Cache
  - type: redis
    name: hackto-redis
    plan: free  # Change to 'starter' or higher for production
    region: oregon
    ipAllowList: []  # Allow all IPs (restricted to internal only)

  # Backend API
  - type: web
    name: hackto-backend
    runtime: node
    region: oregon
    plan: free  # Change to 'starter' for production
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: hackto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hackto-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: VITE_API_BASE_URL
        value: ${RENDER_EXTERNAL_URL}
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JUDGE0_HOST
        value: https://judge0-ce.p.rapidapi.com
      - key: JUDGE0_API_KEY
        sync: false
    routes:
      - path: /api
        matchType: prefix
    healthCheckPath: /health
    healthCheckInterval: 30
    disk:
      name: hackto-backend-disk
      sizeGB: 1
    depends_on:
      - hackto-postgres
      - hackto-redis

  # Frontend
  - type: web
    name: hackto-frontend
    runtime: docker
    region: oregon
    plan: free  # Change to 'starter' for production
    dockerfile: frontend/Dockerfile
    dockerfilePath: ./
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: hackto-backend
          type: web
          property: url
    routes:
      - path: /
        matchType: prefix
    healthCheckPath: /
    healthCheckInterval: 30
    depends_on:
      - hackto-backend

  # Nginx Reverse Proxy (Optional - if needed)
  # For basic deployments, Render handles routing automatically
